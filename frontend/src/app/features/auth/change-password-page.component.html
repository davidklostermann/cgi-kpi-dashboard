<main class="auth-page">
  <section class="auth-card" aria-labelledby="change-password-heading">
    <h1 id="change-password-heading">Passwort ändern</h1>
    <p class="auth-card__hint" role="status">
      Sie müssen Ihr Initialpasswort ändern, bevor Sie das Dashboard nutzen können.
    </p>

    @if (errorMessage(); as message) {
      <p class="auth-card__error" role="alert">{{ message }}</p>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <mat-form-field appearance="outline" class="auth-card__field">
        <mat-label>Aktuelles Passwort</mat-label>
        <input matInput type="password" formControlName="currentPassword" autocomplete="current-password" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="auth-card__field">
        <mat-label>Neues Passwort</mat-label>
        <input matInput type="password" formControlName="newPassword" autocomplete="new-password" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="auth-card__field">
        <mat-label>Neues Passwort bestätigen</mat-label>
        <input matInput type="password" formControlName="confirmPassword" autocomplete="new-password" />
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit" [disabled]="loading()">
        {{ loading() ? 'Wird gespeichert…' : 'Passwort speichern' }}
      </button>
    </form>
  </section>
</main>

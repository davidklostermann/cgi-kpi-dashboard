<section class="portfolio-gantt-section" aria-live="polite">
  @if (status() === 'loading') {
    <p class="portfolio-gantt-section__loading">Zeitleiste wird geladen …</p>
  } @else if (status() === 'error') {
    <div class="portfolio-gantt-section__error" role="alert">
      <p>{{ errorMessage() }}</p>
      <button type="button" class="portfolio-gantt-section__retry" (click)="load()">
        Erneut laden
      </button>
    </div>
  } @else if (timeline(); as data) {
    @if (data.empty || data.projects.length === 0) {
      <p class="portfolio-gantt-section__empty" role="status">Keine Projekte für die Zeitleiste.</p>
    } @else {
      <app-gantt-timeline [projects]="data.projects" />
    }
  }
</section>

<div class="user-management">
  <header class="user-management__header">
    <div class="user-management__title-group">
      <h1 class="user-management__title">Benutzerverwaltung</h1>
      <p class="user-management__subtitle">Verwalten Sie Benutzerkonten, Rollen und den Systemzugriff.</p>
    </div>
    <button mat-flat-button color="primary" (click)="onCreateUser()">
      <mat-icon>add</mat-icon>
      Benutzer anlegen
    </button>
  </header>

  <div class="user-management__content card">
    <table mat-table [dataSource]="dataSource" matSort class="user-management__table">
      
      <!-- Username Column -->
      <ng-container matColumnDef="username">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Benutzername </th>
        <td mat-cell *matCellDef="let user"> {{user.username}} </td>
      </ng-container>

      <!-- Role Column -->
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Rolle </th>
        <td mat-cell *matCellDef="let user">
          <span class="role-badge" [class.role-badge--admin]="user.role === 'ADMIN'">
            {{user.role === 'ADMIN' ? 'Administrator' : 'Benutzer'}}
          </span>
        </td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="active">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Status </th>
        <td mat-cell *matCellDef="let user">
          <app-status-badge [status]="user.active ? 'ON_TRACK' : 'CRITICAL'" 
                            [label]="user.active ? 'Aktiv' : 'Inaktiv'">
          </app-status-badge>
        </td>
      </ng-container>

      <!-- Must Change Password Column -->
      <ng-container matColumnDef="mustChangePassword">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Pw-Wechsel erforderlich </th>
        <td mat-cell *matCellDef="let user">
          {{user.mustChangePassword ? 'Ja' : 'Nein'}}
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Aktionen </th>
        <td mat-cell *matCellDef="let user">
          <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Benutzeraktionen">
            <mat-icon>more_vert</mat-icon>
          </button>
          <mat-menu #menu="matMenu">
            <button mat-menu-item (click)="onEditUser(user)">
              <mat-icon>edit</mat-icon>
              <span>Bearbeiten</span>
            </button>
            <button mat-menu-item (click)="onResetPassword(user)">
              <mat-icon>lock_reset</mat-icon>
              <span>Passwort zurücksetzen</span>
            </button>
          </mat-menu>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <!-- Row shown when there is no matching data. -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="5">Keine Benutzer gefunden.</td>
      </tr>
    </table>
  </div>
</div>

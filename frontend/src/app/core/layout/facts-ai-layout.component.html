<div class="facts-ai-layout">
  <div class="facts-ai-layout__main">
    <ng-content select="[factsMain]" />
  </div>
  <aside class="facts-ai-layout__ai" aria-label="KI-Einschätzungen" [attr.data-has-ai-content]="hasAiContent() ? 'true' : null">
    <ng-content select="[factsAi]" />
    @if (hasAiContent()) {
      <p class="facts-ai-layout__disclaimer">
        KI-generierte Einschätzungen ersetzen keine Fachentscheidung und basieren ausschließlich auf
        freigegebenen Backend-Daten.
      </p>
    }
  </aside>
</div>
